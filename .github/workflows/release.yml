name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: verify package.json version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [[ "$TAG" != "$PKG_VERSION" ]]; then
            echo "error: tag $TAG does not match package.json version $PKG_VERSION"
            echo "Run 'bun run release' locally instead of tagging manually."
            exit 1
          fi

      - name: build mesh-src.zip
        run: |
          zip -rq mesh-src.zip src package.json tsconfig.json README.md \
            -x "node_modules/*" "bun.lock" "bun.lockb" "mesh" ".git/*" "**/.DS_Store"

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            mesh-src.zip
